observables:
# PRELIMINAR: H_0(F_lambda) - for options in obs ;model=WET
  "B->K::Re{H_0(q2,F)}":
    latex: R'\mathrm{Re}\left(\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '-1/(16 * 3.141592653589793^2) * ( {q2}/(2*[[mass::B_d]]^2) * <<b->s::Re{Delta_C9_Qc}(q2)>> * <<B->K::F_plus(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Re{Delta_C7_Qc}(q2)>> * <<B->K::F_plus_T(q2)>> )'
  "B->K::Im{H_0(q2,F)}":
    latex: R'\mathrm{Im}\left(\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '-1/(16 * 3.141592653589793^2) * ( {q2}/(2*[[mass::B_d]]^2) * <<b->s::Im{Delta_C9_Qc}(q2)>> * <<B->K::F_plus(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Im{Delta_C7_Qc}(q2)>> * <<B->K::F_plus_T(q2)>> )'
# BUILD Delta_H_0(q2) 
  "B->K::Re{Delta_H_0(q2)}/Re{H_0(q2,F)}":
    latex: R'\mathrm{Re}\left(\Delta\mathcal{H}_0(q^2)\right)^{B\to K} / \mathrm{Re}\left(\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '(<<B->K::Re{H_plus}(q2)>> - <<B->K::Re{H_0(q2,F)}>>) / <<B->K::Re{H_0(q2,F)}>>'

  "B->K::Im{Delta_H_0(q2)}/Im{H_0(q2,F)}":
    latex: R'\mathrm{Im}\left(\Delta\mathcal{H}_0(q^2)\right)^{B\to K} / \mathrm{Im}\left(\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '(<<B->K::Im{H_plus}(q2)>> - <<B->K::Im{H_0(q2,F)}>>) / <<B->K::Im{H_0(q2,F)}>>'


  "B->K::Re{Delta_H_0(q2)}/F_0(q2)":
    latex: R'\mathrm{Re}\left(\Delta\mathcal{H}_0(q^2)\right)^{B\to K} / \mathrm{Re}\left(\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '(<<B->K::Re{H_plus}(q2)>> - <<B->K::Re{H_0(q2,F)}>>) / <<B->K::F_plus(q2)>>'

  "B->K::Im{Delta_H_0(q2)}/F_0(q2)":
    latex: R'\mathrm{Im}\left(\Delta\mathcal{H}_0(q^2)\right)^{B\to K} / \mathrm{Im}\left(\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '(<<B->K::Im{H_plus}(q2)>> - <<B->K::Im{H_0(q2,F)}>>) / <<B->K::F_plus(q2)>>'



  "B->K::Re{Delta_H_0(q2)}":
    latex: R'\mathrm{Re}\left(\Delta\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '(<<B->K::Re{H_plus}(q2)>> - <<B->K::Re{H_0(q2,F)}>>)'

  "B->K::Im{Delta_H_0(q2)}":
    latex: R'\mathrm{Im}\left(\Delta\mathcal{H}_0(q^2)\right)^{B\to K}'
    unit: '1'
    options: {}
    expression: '(<<B->K::Im{H_plus}(q2)>> - <<B->K::Im{H_0(q2,F)}>>)'



  "B->K::Re{H_0(q2,F)}/F_0(q2)":
    latex: R'\mathrm{Re}(\mathcal{H}_0(q^2))^{B\to K} / F_0(q^2)'
    unit: '1'
    options: {}
    expression: '<<B->K::Re{H_0(q2,F)}>> / <<B->K::F_plus(q2)>>'
  "B->K::Im{H_0(q2,F)}/F_0(q2)":
    latex: R'\mathrm{Im}(\mathcal{H}_0(q^2))^{B\to K} / F_0(q^2)'
    unit: '1'
    options: {}
    expression: '<<B->K::Im{H_0(q2,F)}>> / <<B->K::F_plus(q2)>>'

# SM PREDICIONS

  "B->Kll::Normalized_dBR/ds":
    latex: R'\frac{1}{B(B \to K\, J/\psi)}\frac{dB(B \to K\, \ell^+\ell^-)}{ds}'
    unit: '1/GeV^2'
    options: {tag: 'GvDV2020'}
    expression: '<<B->Kll::dBR/ds>> / <<B->Kpsi::BR>>'



