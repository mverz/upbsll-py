      - 'B->K::f_0+f_++f_T@HPQCD:2013A'
      - 'B->K::f_0+f_++f_T@FNAL+MILC:2015D'
      - 'B->K::f_0+f_++f_T@HPQCD:2022A'
  - name: TH-BToK-LCSR
