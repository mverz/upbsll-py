observables:
# BUILD NON-LOCAL FF OBSERVABLES HERE -------------------------------------------------------
# B to K
  "B->K::Re{H_0(q2)/F_0(q2)}":
    latex: R'\Re\left(\frac{\mathcal{H}_0(q^2)}{\mathcal{F}_0(q^2)}\right)^{B\to K}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K::F_plus(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Re{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Re{Delta_C7_Qc}(q2)>> * <<B->K::F_plus_T(q2)/F_plus(q2)>> )'

  "B->K::Im{H_0(q2)/F_0(q2)}":
    latex: R'\Im\left(\frac{\mathcal{H}_0(q^2)}{\mathcal{F}_0(q^2)}\right)^{B\to K}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K::F_plus(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Im{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Im{Delta_C7_Qc}(q2)>> * <<B->K::F_plus_T(q2)/F_plus(q2)>> )'


# B to K^*
  "B->K^*::Re{H_0(q2)/F_0(q2)}":
    latex: R'\Re\left(\frac{\mathcal{H}_0(q^2)}{\mathcal{F}_0(q^2)}\right)^{B\to K^*}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K^*::F_long(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Re{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Re{Delta_C7_Qc}(q2)>> * <<B->K^*::F_long_T(q2)/F_long(q2)>> )'
  
  "B->K^*::Im{H_0(q2)/F_0(q2)}":
    latex: R'\Im\left(\frac{\mathcal{H}_0(q^2)}{\mathcal{F}_0(q^2)}\right)^{B\to K^*}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K^*::F_long(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Im{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Im{Delta_C7_Qc}(q2)>> * <<B->K^*::F_long_T(q2)/F_long(q2)>> )'


  "B->K^*::Re{H_perp(q2)/F_perp(q2)}":
    latex: R'\Re\left(\frac{\mathcal{H}_perp(q^2)}{\mathcal{F}_perp(q^2)}\right)^{B\to K^*}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K^*::F_perp(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Re{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Re{Delta_C7_Qc}(q2)>> * <<B->K^*::F_perp_T(q2)/F_perp(q2)>> )'

  "B->K^*::Im{H_perp(q2)/F_perp(q2)}":
    latex: R'\Im\left(\frac{\mathcal{H}_perp(q^2)}{\mathcal{F}_perp(q^2)}\right)^{B\to K^*}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K^*::F_perp(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Im{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Im{Delta_C7_Qc}(q2)>> * <<B->K^*::F_perp_T(q2)/F_perp(q2)>> )'


  "B->K^*::Re{H_para(q2)/F_para(q2)}":
    latex: R'\Re\left(\frac{\mathcal{H}_para(q^2)}{\mathcal{F}_para(q^2)}\right)^{B\to K^*}'
    unit: '1'
    options: {'model':'WET'}
    expression: '-1/(16 * 3.141592653589793^2) * <<B->K^*::F_para(q2)>> *  ( {q2}^2/(2*[[mass::B_d]]^2) * <<b->s::Re{Delta_C9_Qc}(q2)>> + [[mass::b(MSbar)]]/[[mass::B_d]] * <<b->s::Re{Delta_C7_Qc}(q2)>> * <<B->K^*::F_para_T(q2)/F_para(q2)>> )'

