observables:
#----------------LHCb double differential decay rate----------------
  "B->K::beta@LHCb2026":
    latex: R'\beta^{B\to K \ell\ell}'
    unit: '1'
    options: {}
    expression: '(1 - 4 * [[mass::mu]]^2 / {q2})^0.5'
  "B->K::lambda@LHCb2026":
    latex: R'\lambda^{B\to K \ell\ell}'
    unit: 'GeV4'
    options: {}
    expression: '[[mass::B_d]]^4 + [[mass::K_d]]^4 + {q2}^2 - 2 * ([[mass::B_d]]^2 * [[mass::K_d]]^2 + [[mass::B_d]]^2 * {q2} + [[mass::K_d]]^2 * {q2})'
  "B->K::eta@LHCb2026":
    latex: R'\eta^{B\to K \ell\ell}'
    unit: 'InverseGeV2'
    options: {}
    expression: '4 * [[mass::mu]]^2 * ([[mass::B_d]]^2 - [[mass::K_d]]^2) / ( {q2} * <<B->K::beta@LHCb2026>>^2 * <<B->K::lambda@LHCb2026>> ) * (<<B->K::f_0(q2)>> / <<B->K::f_+(q2)>>)^2'

  "B->K::A@LHCb2026":
    latex: R'A^{B\to K \ell\ell}'
    unit: '1'
    options: {}
    expression: '(<<B->K::lambda@LHCb2026>>^0.5 / (2 * [[mass::B_d]]) * <<B->K::beta@LHCb2026>>) * (-1) * ( <<B->Kll::c_l(q2)>> + <<B->K::beta@LHCb2026>>^2 * <<B->Kll::a_l(q2)>> ) / ( 1 - <<B->K::beta@LHCb2026>>^2 * (1 + <<B->K::eta@LHCb2026>>) )'
  "B->K::B@LHCb2026":
    latex: R'B^{B\to K \ell\ell}'
    unit: '1'
    options: {}
    expression: '(-1) * (<<B->K::lambda@LHCb2026>>^0.5 / (2 * [[mass::B_d]]) * <<B->K::beta@LHCb2026>>) * <<B->K::eta@LHCb2026>> * ( <<B->Kll::c_l(q2)>> + <<B->K::beta@LHCb2026>>^2 * <<B->Kll::a_l(q2)>> ) / ( 1 - <<B->K::beta@LHCb2026>>^2 * (1 + <<B->K::eta@LHCb2026>>) )'
  "B->K::C@LHCb2026":
    latex: R'C^{B\to K \ell\ell}'
    unit: '1'
    options: {}
    expression: '(<<B->K::lambda@LHCb2026>>^0.5 / (2 * [[mass::B_d]]) * <<B->K::beta@LHCb2026>>) * ( <<B->Kll::a_l(q2)>> + (1 + <<B->K::eta@LHCb2026>>) * <<B->Kll::c_l(q2)>> ) / ( 1 - <<B->K::beta@LHCb2026>>^2 * (1 + <<B->K::eta@LHCb2026>>) )'

  "B->Kll::ECAf0":
    latex: R'\mathcal{E}_{C_A}^{f_0}'
    unit: '1'
    options: {}
    expression: '0.970594 - 0.11868 *({q2}^0.5) - 0.0616107 *({q2}^0.5)^2 + 0.0827238 *({q2}^0.5)^3 - 0.0136798 *({q2}^0.5)^4'
  "B->Kll::ECVfplus":
    latex: R'\mathcal{E}_{C_V}^{f_+}'
    unit: '1'
    options: {}
    expression: '0.914562 + 0.263382 *({q2}^0.5) - 0.347694 *({q2}^0.5)^2 + 0.156075 *({q2}^0.5)^3 - 0.0200146 *({q2}^0.5)^4'
  "B->Kll::ECVf0":
    latex: R'\mathcal{E}_{C_V}^{f_0}'
    unit: '1'
    options: {}
    expression: '0.96206 + 0.198174 *({q2}^0.5) - 0.31474 *({q2}^0.5)^2 + 0.148852 *({q2}^0.5)^3 - 0.019437 *({q2}^0.5)^4'

  "B->Kll::eff-differential-decay-rate":
    latex: R'\frac{d\Gamma}{dq^2}'
    unit: 'InverseGeV2'
    options: {}
    expression: '<<B->K::A@LHCb2026>> * <<B->Kll::ECAf0>> + <<B->K::B@LHCb2026>> * <<B->Kll::ECVfplus>> + <<B->K::C@LHCb2026>> * <<B->Kll::ECVf0>>'
